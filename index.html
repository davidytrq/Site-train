<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillgram</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header pill">Pillgram</header>

    <nav class="nav">
        <button class="nav-pill active" data-tab="home">Home</button>
        <button class="nav-pill" data-tab="messages">Messages</button>
        <button class="nav-pill" data-tab="profile">Profile</button>
    </nav>

    <main class="container">
        <!-- Home Section -->
        <section id="home" class="tab-content active">
            <div class="post-creator pill">
                <textarea placeholder="Share something…" rows="2"></textarea>
                <button class="post-btn pill">Post</button>
            </div>
            <div class="post pill">
                <div class="post-header">
                    <strong>demo_user</strong>
                </div>
                <div class="post-content">
                    Welcome to Pillgram! just testing.
                </div>
                <div class="post-actions">
                    <button class="like-btn pill">Like</button>
                    <button class="comment-btn pill">Comment</button>
                </div>
            </div>
            <!-- More posts can be added here -->
        </section>

        <!-- Messages Section -->
        <section id="messages" class="tab-content">
            <div class="message-list">
                <div class="message-item pill">
                    <strong>Alice:</strong> Hey! How's it going?
                </div>
                <div class="message-item pill">
                    <strong>Bob:</strong> Did you see the new post?
                </div>
            </div>
            <div class="message-input-area">
                <input type="text" placeholder="Type a message…" class="message-input pill">
                <button class="send-btn pill">Send</button>
            </div>
        </section>

        <!-- Profile Section -->
        <section id="profile" class="tab-content">
            <div class="profile-header pill">
                <h2>Profile</h2><div class="profile-pic-container">
    <img src="your-image.jpg" alt="Profile Picture" class="profile-img">
</div>

            </div>
            <div class="profile-stats pill">
                <span>Posts: 0</span>
                <span>Followers: 0</span>
                <span>Following: 0</span>
            </div>
            <div class="profile-bio pill">
                <p>Welcome to my beta social new </p>
            </div>
                </div>
        </section>
    </main>
</body>
</html>
        </section>
    </main>
</body>
</html>
